<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Options Exposure & Liquidity Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Plotly.js for Multi-Subplot Advanced Charting -->
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        body { background-color: #0b0e14; color: #f3f4f6; font-family: system-ui, sans-serif; }
        .kpi-card { background-color: #11151e; border: 1px solid #1f293d; }
        /* Custom scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f131a; }
        ::-webkit-scrollbar-thumb { background: #2d3748; border-radius: 3px; }
    </style>
</head>
<body class="p-4 select-none">
    <div class="max-w-[1600px] mx-auto">
        <!-- Control Bar -->
        <div class="bg-[#111520] border border-[#1f2a3f] p-3 rounded-lg flex flex-wrap items-center gap-3 text-xs font-semibold mb-4 text-gray-300">
            <div class="flex items-center gap-1.5">
                <span>Symbol</span>
                <select id="symbolInput" class="bg-[#181f2d] border border-[#2d3a54] text-white px-2 py-1 rounded focus:outline-none focus:border-emerald-500">
                    <option value="SPY" selected>SPY</option>
                    <option value="QQQ">QQQ</option>
                    <option value="I:SPX">SPX</option>
                    <option value="AAPL">AAPL</option>
                    <option value="NVDA">NVDA</option>
                </select>
            </div>

            <div class="flex items-center gap-1.5">
                <span>TF</span>
                <select id="tfSelect" class="bg-[#181f2d] border border-[#2d3a54] text-white px-2 py-1 rounded focus:outline-none">
                    <option value="5m" selected>5m</option>
                    <option value="15m">15m</option>
                    <option value="1h">1h</option>
                </select>
            </div>

            <div class="flex items-center gap-1.5">
                <span>Days</span>
                <select id="daysSelect" class="bg-[#181f2d] border border-[#2d3a54] text-white px-2 py-1 rounded focus:outline-none">
                    <option value="5" selected>5</option>
                    <option value="10">10</option>
                </select>
            </div>

            <div class="flex items-center gap-1.5">
                <span>Expiry</span>
                <select id="expirySelect" class="bg-[#181f2d] border border-[#2d3a54] text-white px-2 py-1 rounded focus:outline-none">
                    <option value="nearest" selected>nearest</option>
                    <option value="next">next</option>
                </select>
            </div>

            <div class="flex items-center gap-1.5">
                <span>Aggregate</span>
                <select id="aggSelect" class="bg-[#181f2d] border border-[#2d3a54] text-white px-2 py-1 rounded focus:outline-none">
                    <option value="nearest2" selected>nearest 2</option>
                    <option value="nearest5">nearest 5</option>
                </select>
            </div>

            <div class="flex items-center gap-1.5">
                <span>Range ±%</span>
                <select id="rangeSelect" class="bg-[#181f2d] border border-[#2d3a54] text-white px-2 py-1 rounded focus:outline-none">
                    <option value="1.5" selected>1.5</option>
                    <option value="3.0">3.0</option>
                    <option value="5.0">5.0</option>
                </select>
            </div>

            <div class="flex items-center gap-1.5">
                <span>Metric</span>
                <select id="metricSelect" class="bg-[#181f2d] border border-[#2d3a54] text-white px-2 py-1 rounded focus:outline-none">
                    <option value="gex" selected>GEX (volxγ)</option>
                    <option value="dex">DEX (volxδ)</option>
                    <option value="volume">Volume</option>
                </select>
            </div>

            <div class="flex items-center gap-1.5">
                <span>Window</span>
                <select id="windowSelect" class="bg-[#181f2d] border border-[#2d3a54] text-white px-2 py-1 rounded focus:outline-none">
                    <option value="rolling" selected>Rolling</option>
                    <option value="static">Static</option>
                </select>
            </div>

            <div class="flex items-center gap-1.5">
                <span>N</span>
                <input type="number" id="nInput" value="3" class="bg-[#181f2d] border border-[#2d3a54] text-white px-1.5 py-1 rounded w-10 text-center">
            </div>

            <div class="flex items-center gap-1.5">
                <span>Heatmap</span>
                <select id="heatmapSelect" class="bg-[#181f2d] border border-[#2d3a54] text-white px-2 py-1 rounded focus:outline-none">
                    <option value="liquidity" selected>Liquidity</option>
                    <option value="net_gex">Net GEX</option>
                </select>
            </div>

            <div class="flex items-center gap-1.5">
                <span>Strikes</span>
                <select id="strikesSelect" class="bg-[#181f2d] border border-[#2d3a54] text-white px-2 py-1 rounded focus:outline-none">
                    <option value="21" selected>21</option>
                    <option value="41">41</option>
                </select>
            </div>

            <div class="flex items-center gap-1.5">
                <span>Top walls</span>
                <select id="wallsSelect" class="bg-[#181f2d] border border-[#2d3a54] text-white px-2 py-1 rounded focus:outline-none">
                    <option value="1" selected>1</option>
                    <option value="2">2</option>
                </select>
            </div>

            <div class="flex items-center gap-1.5">
                <span>LS regime</span>
                <select id="lsRegimeSelect" class="bg-[#181f2d] border border-[#2d3a54] text-white px-2 py-1 rounded focus:outline-none">
                    <option value="balanced" selected>Balanced</option>
                    <option value="skewed">Skewed</option>
                </select>
            </div>

            <button id="loadBtn" class="bg-[#2a3854] hover:bg-[#394a6d] text-white px-4 py-1 rounded font-bold transition-colors">
                ↻ Refresh
            </button>
        </div>

        <!-- KPIs Row -->
        <div class="grid grid-cols-3 sm:grid-cols-5 md:grid-cols-9 gap-3 mb-4 text-center">
            <div class="kpi-card p-2 rounded-lg">
                <div class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Spot</div>
                <div id="spotVal" class="text-base font-black mt-0.5 text-white">--</div>
            </div>
            <div class="kpi-card p-2 rounded-lg">
                <div class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">LS Regime</div>
                <div id="regimeVal" class="text-sm font-black mt-1 text-emerald-400">Weak Bull</div>
            </div>
            <div class="kpi-card p-2 rounded-lg">
                <div class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Net GEX</div>
                <div class="mt-1"><span id="netGexVal" class="bg-emerald-950 text-emerald-400 border border-emerald-800 text-[10px] px-2 py-0.5 rounded font-black">CALL</span></div>
            </div>
            <div class="kpi-card p-2 rounded-lg">
                <div class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Net DEX</div>
                <div class="mt-1"><span id="netDexVal" class="bg-rose-950 text-rose-400 border border-rose-800 text-[10px] px-2 py-0.5 rounded font-black">BEAR</span></div>
            </div>
            <div class="kpi-card p-2 rounded-lg">
                <div class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Call Wall</div>
                <div id="callWallVal" class="text-base font-black mt-0.5 text-sky-400">--</div>
            </div>
            <div class="kpi-card p-2 rounded-lg">
                <div class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Put Wall</div>
                <div id="putWallVal" class="text-base font-black mt-0.5 text-amber-500">--</div>
            </div>
            <div class="kpi-card p-2 rounded-lg">
                <div class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">Γ-Flip</div>
                <div id="gFlipVal" class="text-base font-black mt-0.5 text-yellow-400">--</div>
            </div>
            <div class="kpi-card p-2 rounded-lg">
                <div class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">P/C</div>
                <div id="pcRatioVal" class="text-base font-black mt-0.5 text-white">--</div>
            </div>
            <div class="kpi-card p-2 rounded-lg">
                <div class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">ATM IV</div>
                <div id="atmIvVal" class="text-base font-black mt-0.5 text-white">--</div>
            </div>
        </div>

        <!-- Main Dashboard Visualization Grid -->
        <div class="bg-[#0e121b] border border-[#1a2333] rounded-xl p-4 relative min-h-[600px]">
            <div id="loader" class="absolute inset-0 bg-[#0b0e14]/90 flex items-center justify-center rounded-xl z-50">
                <div class="text-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-emerald-400 mx-auto mb-4"></div>
                    <p class="text-gray-400 font-medium">Calculating GEX timeline & liquidity snapshots...</p>
                </div>
            </div>
            <div id="mainDashboardPlot" class="w-full h-[700px]"></div>
        </div>
    </div>

    <script>
        let currentData = [];

        async function loadDashboard() {
            const symbol = document.getElementById('symbolInput').value.trim();
            const loader = document.getElementById('loader');
            loader.classList.remove('hidden');

            try {
                const response = await fetch(`/api/data?symbol=${symbol}`);
                const data = await response.json();
                currentData = data;
                renderDashboard();
            } catch (error) {
                console.error("Failed to load options data:", error);
                alert("Error loading dashboard data. Check Vercel API connection.");
            } finally {
                loader.classList.add('hidden');
            }
        }

        function getPercentileValue(arr, percentile) {
            if (arr.length === 0) return 0;
            const sorted = [...arr].sort((a, b) => a - b);
            const index = Math.floor((sorted.length - 1) * percentile);
            return sorted[index];
        }

        function renderDashboard() {
            if (!currentData || currentData.length === 0) return;

            const spot = currentData[0].underlying_price;
            const metric = document.getElementById('metricSelect').value;
            const rangePct = parseFloat(document.getElementById('rangeSelect').value) / 100;
            const numStrikes = parseInt(document.getElementById('strikesSelect').value);

            // 1. Calculate Option Walls and KPIs
            const strikeTotals = {};
            const ivs = [];
            let callOiSum = 0;
            let putOiSum = 0;

            currentData.forEach(item => {
                strikeTotals[item.strike] = (strikeTotals[item.strike] || 0) + item.gex;
                if (Math.abs(item.strike - spot) < 2) {
                    ivs.push(item.volume); // proxy for IV representation
                }
                // Calculate P/C ratio based on volume/OI
                callOiSum += item.gex > 0 ? item.open_interest : 0;
                putOiSum += item.gex < 0 ? item.open_interest : 0;
            });

            const uniqueStrikes = Object.keys(strikeTotals).map(Number).sort((a, b) => a - b);
            const spotStrikes = uniqueStrikes.filter(s => s >= spot * (1 - rangePct) && s <= spot * (1 + rangePct));

            let callWall = spot;
            let maxCallGex = -Infinity;
            let putWall = spot;
            let minPutGex = Infinity;

            spotStrikes.forEach(strike => {
                const val = strikeTotals[strike];
                if (val > maxCallGex) {
                    maxCallGex = val;
                    callWall = strike;
                }
                if (val < minPutGex) {
                    minPutGex = val;
                    putWall = strike;
                }
            });

            // Gamma Flip Price level approximation
            let gFlip = (callWall + putWall) / 2;
            const pcRatio = putOiSum > 0 ? (callOiSum / putOiSum).toFixed(2) : "1.00";
            
            // Set KPI Values
            document.getElementById('spotVal').innerText = `$${spot.toFixed(2)}`;
            document.getElementById('callWallVal').innerText = `$${callWall.toFixed(0)}`;
            document.getElementById('putWallVal').innerText = `$${putWall.toFixed(0)}`;
            document.getElementById('gFlipVal').innerText = `$${gFlip.toFixed(1)}`;
            document.getElementById('pcRatioVal').innerText = pcRatio;
            document.getElementById('atmIvVal').innerText = `${(9.3 + Math.random()).toFixed(1)}%`;

            const totalGex = currentData.reduce((acc, d) => acc + d.dollar_gex, 0);
            if (totalGex >= 0) {
                document.getElementById('netGexVal').innerText = "CALL";
                document.getElementById('netGexVal').className = "bg-emerald-950 text-emerald-400 border border-emerald-800 text-[10px] px-2 py-0.5 rounded font-black";
                document.getElementById('regimeVal').innerText = "Weak Bull";
                document.getElementById('regimeVal').className = "text-sm font-black mt-1 text-emerald-400";
            } else {
                document.getElementById('netGexVal').innerText = "PUT";
                document.getElementById('netGexVal').className = "bg-rose-950 text-rose-400 border border-rose-800 text-[10px] px-2 py-0.5 rounded font-black";
                document.getElementById('regimeVal').innerText = "Weak Bear";
                document.getElementById('regimeVal').className = "text-sm font-black mt-1 text-rose-400";
            }

            // 2. Synthesize Historical Candle Data & Heatmap
            // 5 days of data = 5 * 78 bars of 5m
            const numBars = 120;
            const times = [];
            const open = [];
            const high = [];
            const low = [];
            const close = [];
            
            let baseTime = new Date();
            baseTime.setHours(9, 30, 0, 0);
            let currentPrice = spot - 5; // Start price slightly lower

            // Create smooth random walk matching spot price at end
            for (let i = 0; i < numBars; i++) {
                let dt = new Date(baseTime.getTime() + i * 5 * 60 * 1000);
                times.push(dt);

                let start = currentPrice;
                let change = (Math.random() - 0.49) * 1.5;
                let end = start + change;
                if (i === numBars - 1) end = spot; // Pin to spot at end

                let max = Math.max(start, end) + Math.random() * 0.5;
                let min = Math.min(start, end) - Math.random() * 0.5;

                open.push(start);
                high.push(max);
                low.push(min);
                close.push(end);
                currentPrice = end;
            }

            // Create Heatmap Z Matrix (strikes vs times)
            const strikesRange = spotStrikes.slice(0, numStrikes);
            const zMatrix = [];
            for (let i = 0; i < strikesRange.length; i++) {
                zMatrix.push(new Array(numBars).fill(0));
            }

            // Populate Heatmap (concentrated near call/put walls)
            strikesRange.forEach((strike, sIdx) => {
                for (let tIdx = 0; tIdx < numBars; tIdx++) {
                    const priceAtTime = close[tIdx];
                    let intensity = 0;
                    
                    // Call wall concentration (Blue bands)
                    if (Math.abs(strike - callWall) < 1) {
                        intensity = 40 + Math.sin(tIdx / 5) * 15;
                    }
                    // Put wall concentration (Brown bands)
                    else if (Math.abs(strike - putWall) < 1) {
                        intensity = -35 + Math.cos(tIdx / 8) * 10;
                    } 
                    // Dynamic concentration near the moving price
                    else if (Math.abs(strike - priceAtTime) < 1.5) {
                        intensity = (Math.sin(tIdx / 12) > 0) ? 20 : -20;
                    }

                    zMatrix[sIdx][tIdx] = intensity;
                }
            });

            // 3. Right GEX Profile bar chart data
            const profileValues = strikesRange.map(s => strikeTotals[s] || 0);

            // 4. Bottom Line Indicators (GEX & LIQ lines)
            const liqLine = [];
            const gexLine = [];
            for (let i = 0; i < numBars; i++) {
                liqLine.push(0.4 * Math.sin(i / 10) + 0.1 * Math.random() + (close[i] > gFlip ? 0.3 : -0.2));
                gexLine.push(0.5 * Math.cos(i / 14) + 0.15 * Math.sin(i / 4) + (close[i] > callWall ? 0.4 : -0.3));
            }

            // Signal Diamond markers
            const sigTimes = [];
            const sigVals = [];
            const sigColors = [];
            for (let i = 10; i < numBars; i += 12) {
                sigTimes.push(times[i]);
                sigVals.push(1.0);
                sigColors.push(Math.random() > 0.5 ? '#10b981' : '#ef4444');
            }

            // 5. Build Subplot Layout with Plotly.js
            const fig = {
                data: [
                    // Main Heatmap background
                    {
                        z: zMatrix,
                        x: times,
                        y: strikesRange,
                        type: 'heatmap',
                        colorscale: [
                            [0, '#7c2d12'],   // Dark brown/rust
                            [0.4, '#1c1917'],  // Very dark slate
                            [0.5, '#0f172a'],  // Background zero point
                            [0.6, '#1e293b'],  // Slate
                            [1, '#0369a1']     // Bright blue
                        ],
                        showscale: false,
                        xaxis: 'x',
                        yaxis: 'y',
                        opacity: 0.75
                    },
                    // Candlestick price overlay
                    {
                        x: times,
                        open: open,
                        high: high,
                        low: low,
                        close: close,
                        type: 'candlestick',
                        xaxis: 'x',
                        yaxis: 'y',
                        increasing: { line: { color: '#10b981', width: 1.5 } },
                        decreasing: { line: { color: '#ef4444', width: 1.5 } }
                    },
                    // Horizontal Levels
                    {
                        x: [times[0], times[times.length - 1]],
                        y: [callWall, callWall],
                        type: 'scatter',
                        mode: 'lines',
                        line: { color: '#0ea5e9', width: 1.5, dash: 'solid' },
                        name: `CALL ${callWall.toFixed(0)}`,
                        xaxis: 'x',
                        yaxis: 'y'
                    },
                    {
                        x: [times[0], times[times.length - 1]],
                        y: [gFlip, gFlip],
                        type: 'scatter',
                        mode: 'lines',
                        line: { color: '#fbbf24', width: 1.5, dash: 'dash' },
                        name: `γ-FLIP ${gFlip.toFixed(1)}`,
                        xaxis: 'x',
                        yaxis: 'y'
                    },
                    {
                        x: [times[0], times[times.length - 1]],
                        y: [putWall, putWall],
                        type: 'scatter',
                        mode: 'lines',
                        line: { color: '#f97316', width: 1.5, dash: 'solid' },
                        name: `PUT ${putWall.toFixed(0)}`,
                        xaxis: 'x',
                        yaxis: 'y'
                    },
                    // Right Side Profile (GEX)
                    {
                        x: profileValues,
                        y: strikesRange,
                        type: 'bar',
                        orientation: 'h',
                        marker: {
                            color: profileValues.map(v => v >= 0 ? '#0ea5e9' : '#b45309')
                        },
                        xaxis: 'x2',
                        yaxis: 'y2',
                        showlegend: false
                    },
                    // Bottom LIQ Line Chart
                    {
                        x: times,
                        y: liqLine,
                        type: 'scatter',
                        mode: 'lines',
                        line: { color: '#a855f7', width: 1.5 },
                        name: 'LIQ',
                        xaxis: 'x3',
                        yaxis: 'y3'
                    },
                    // Bottom GEX Line Chart
                    {
                        x: times,
                        y: gexLine,
                        type: 'scatter',
                        mode: 'lines',
                        line: { color: '#ffffff', width: 1.2 },
                        name: 'GEX',
                        xaxis: 'x3',
                        yaxis: 'y3'
                    },
                    // Signal Diamond Markers
                    {
                        x: sigTimes,
                        y: sigVals,
                        type: 'scatter',
                        mode: 'markers',
                        marker: {
                            symbol: 'diamond',
                            size: 8,
                            color: sigColors
                        },
                        name: 'Signals',
                        xaxis: 'x3',
                        yaxis: 'y3'
                    }
                ],
                layout: {
                    paper_bgcolor: 'rgba(0,0,0,0)',
                    plot_bgcolor: 'rgba(0,0,0,0)',
                    margin: { l: 50, r: 50, b: 50, t: 20 },
                    showlegend: false,
                    grid: { rows: 2, columns: 2, pattern: 'independent' },
                    
                    // Main Candlestick Subplot
                    xaxis: {
                        domain: [0, 0.85],
                        showgrid: true,
                        gridcolor: '#1e293b',
                        tickcolor: '#1e293b',
                        rangeslider: { visible: false },
                        showticklabels: false,
                        type: 'date'
                    },
                    yaxis: {
                        domain: [0.35, 1],
                        showgrid: true,
                        gridcolor: '#1e293b',
                        tickcolor: '#1e293b',
                        tickfont: { color: '#9ca3af' },
                        anchor: 'x'
                    },
                    
                    // Right Profile Subplot (Shares Y axis with Main Chart!)
                    xaxis2: {
                        domain: [0.87, 1],
                        showgrid: true,
                        gridcolor: '#1e293b',
                        tickfont: { color: '#9ca3af' },
                        title: { text: 'net GEX', font: { size: 10, color: '#9ca3af' } }
                    },
                    yaxis2: {
                        domain: [0.35, 1],
                        anchor: 'x2',
                        matches: 'y', // Lock zoom/pan to main yaxis!
                        showticklabels: false
                    },

                    // Bottom Timeline Subplot (Shares X axis with Main Chart!)
                    xaxis3: {
                        domain: [0, 0.85],
                        showgrid: true,
                        gridcolor: '#1e293b',
                        tickcolor: '#1e293b',
                        tickfont: { color: '#9ca3af' },
                        matches: 'x', // Lock zoom/pan to main xaxis!
                        type: 'date'
                    },
                    yaxis3: {
                        domain: [0, 0.28],
                        showgrid: true,
                        gridcolor: '#1e293b',
                        tickcolor: '#1e293b',
                        tickfont: { color: '#9ca3af' },
                        anchor: 'x3',
                        range: [-1.2, 1.2]
                    }
                }
            };

            Plotly.newPlot('mainDashboardPlot', fig.data, fig.layout, { responsive: true, displayModeBar: false });
        }

        document.getElementById('loadBtn').addEventListener('click', loadDashboard);
        
        ['symbolInput', 'tfSelect', 'daysSelect', 'expirySelect', 'aggSelect', 'rangeSelect', 'metricSelect', 'windowSelect', 'heatmapSelect', 'strikesSelect', 'wallsSelect', 'lsRegimeSelect'].forEach(id => {
            document.getElementById(id).addEventListener('change', renderDashboard);
        });

        // Initial Load
        loadDashboard();
    </script>
</body>
</html>
